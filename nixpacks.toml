[phases.setup]
# aptPkgs مش بيشتغل هنا، بنستخدم nixPkgs لتثبيت برامج النظام على Railway
nixPkgs = ["ffmpeg", "ffmpeg-full"]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "pip install --upgrade --force-reinstall git+https://github.com/yt-dlp/yt-dlp.git"
]

[start]
cmd = "python main.py"
